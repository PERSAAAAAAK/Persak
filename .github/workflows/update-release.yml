name: Update Spotify Release

on:
  schedule:
    - cron: "1 * * * *"   # ogni ora al minuto 01
  push:
    branches: [main]
  workflow_dispatch:       # eseguibile manualmente dalla tab Actions

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release from Spotify
        env:
          CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          if [ -f .env ]; then
            export $(grep -v '^#' .env | xargs)
          fi

          TOKEN=$(curl -s -X POST https://accounts.spotify.com/api/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}" \
            | jq -r '.access_token')

          ARTIST_ID="6WLZ4Ff7FplLaiU0odCGSd"

          curl -s "https://api.spotify.com/v1/artists/${ARTIST_ID}/albums?include_groups=album,single&market=IT&limit=20" \
            -H "Authorization: Bearer ${TOKEN}" | jq --arg id "$ARTIST_ID" '
              .items | map(select(any(.artists[]; .id == $id))) | .[0]
            ' > data/release.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/release.json
          git diff --cached --quiet || git commit -m "chore: aggiorna ultima uscita Spotify"
          git push
