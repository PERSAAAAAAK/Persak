name: Update Spotify Release

on:
  schedule:
    - cron: "0 6 * * *"   # ogni giorno alle 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:       # eseguibile manualmente dalla tab Actions

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release from Spotify
        env:
          CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          TOKEN=$(curl -s -X POST https://accounts.spotify.com/api/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}" \
            | jq -r '.access_token')

          ARTIST_ID=$(curl -s "https://api.spotify.com/v1/search?q=Persak&type=artist&limit=1" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.artists.items[0].id')

          ALBUMS=$(curl -s "https://api.spotify.com/v1/artists/${ARTIST_ID}/albums?include_groups=album&market=IT&limit=5" \
            -H "Authorization: Bearer ${TOKEN}" | jq '.items')

          SINGLES=$(curl -s "https://api.spotify.com/v1/artists/${ARTIST_ID}/albums?include_groups=single&market=IT&limit=5" \
            -H "Authorization: Bearer ${TOKEN}" | jq '.items')

          echo "${ALBUMS} ${SINGLES}" | jq -s '
            (.[0] + .[1])
            | sort_by(.release_date)
            | reverse
            | .[0]
          ' > data/release.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/release.json
          git diff --cached --quiet || git commit -m "chore: aggiorna ultima uscita Spotify"
          git push
