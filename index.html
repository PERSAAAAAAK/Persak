<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Persak</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/reset.css" />
        <link rel="stylesheet" href="assets/css/style.css" />
    </head>
    <body>
        <div class="bg"></div>
        <svg width="0" height="0" style="position: absolute">
            <defs>
                <filter id="noise" x="0%" y="0%" width="100%" height="100%">
                    <feTurbulence
                        type="fractalNoise"
                        baseFrequency="0.25"
                        numOctaves="5"
                        stitchTiles="stitch"
                    />
                    <feColorMatrix type="saturate" values="0" />
                    <feBlend in="SourceGraphic" mode="multiply" />
                </filter>
            </defs>
        </svg>
        <div class="container">
            <header>
                <img
                    src="assets/img/f51cb459-5065-4b55-adf9-8ce5cd7eef71-Photoroom.png"
                    alt="Persak"
                />
            </header>
            <iframe
                data-testid="embed-iframe"
                style="border-radius: 12px"
                src="https://open.spotify.com/embed/artist/6WLZ4Ff7FplLaiU0odCGSd?utm_source=generator"
                width="100%"
                height="352"
                frameborder="0"
                allowfullscreen=""
                allow="
                    autoplay;
                    clipboard-write;
                    encrypted-media;
                    fullscreen;
                    picture-in-picture;
                "
                loading="lazy"
            ></iframe>
            <div class="ultima-uscita"></div>
            <nav class="social">
                <a
                    href="https://open.spotify.com/artist/6WLZ4Ff7FplLaiU0odCGSd"
                    target="_blank"
                    rel="noopener"
                    >Spotify</a
                >
                <a
                    href="https://www.instagram.com/persaaak?igsh=MXR5dHAwZmZpc2hmMg=="
                    target="_blank"
                    rel="noopener"
                    >Instagram</a
                >
                <a
                    href="https://www.tiktok.com/@persak.bandini?_r=1&_t=ZN-94sKAn7JjD4"
                    target="_blank"
                    rel="noopener"
                    >TikTok</a
                >
            </nav>
            <footer>
                <p>
                    &copy;
                    <script>
                        document.write(new Date().getFullYear());
                    </script>
                    Persak
                </p>
            </footer>
        </div>

        <script src="assets/js/main.js" defer></script>
    </body>
</html>
